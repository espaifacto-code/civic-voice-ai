<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
    <line x1="0" y1="126" x2="1200" y2="126" />
    <line x1="0" y1="252" x2="1200" y2="252" />
    <line x1="0" y1="378" x2="1200" y2="378" />
    <line x1="0" y1="504" x2="1200" y2="504" />
  </g>

  <!-- Accent bar -->
  <rect x="80" y="230" width="6" height="160" fill="url(#accent)" rx="3" />

  <!-- Decorative circle -->
  <circle cx="1060" cy="315" r="180" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.15" />
  <circle cx="1060" cy="315" r="130" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.12" />
  <circle cx="1060" cy="315" r="80" fill="#3b82f6" opacity="0.06" />

  <!-- Icon: simplified civic/voice waveform nodes -->
  <g transform="translate(1020, 275)" opacity="0.5">
    <circle cx="0"   cy="40" r="8"  fill="#06b6d4" />
    <circle cx="40"  cy="10" r="6"  fill="#3b82f6" />
    <circle cx="80"  cy="50" r="7"  fill="#06b6d4" />
    <circle cx="40"  cy="70" r="5"  fill="#93c5fd" />
    <line x1="0" y1="40"  x2="40" y2="10"  stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <line x1="40" y1="10" x2="80" y2="50"  stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
    <line x1="40" y1="10" x2="40" y2="70"  stroke="#93c5fd" stroke-width="1"   opacity="0.5"/>
    <line x1="0"  y1="40" x2="40" y2="70"  stroke="#06b6d4" stroke-width="1"   opacity="0.4"/>
  </g>

  <!-- Main title -->
  <text x="114" y="290"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="68"
    font-weight="700"
    letter-spacing="-1"
    fill="#f8fafc">Participatory</text>

  <text x="114" y="370"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="68"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#accent)">Civic AI</text>

  <!-- Tagline -->
  <text x="114" y="420"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#94a3b8"
    letter-spacing="0.3">Transforming citizen voices into structured public insight.</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0f172a" opacity="0.6" />
  <text x="80" y="617"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18"
    font-weight="500"
    fill="#64748b"
    letter-spacing="1">COMMON PRAXIS</text>
  <text x="1120" y="617"
    text-anchor="end"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18"
    font-weight="400"
    fill="#475569">Mozilla Democracy &amp; AI Incubator</text>
</svg>
